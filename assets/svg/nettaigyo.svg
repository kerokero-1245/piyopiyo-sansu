<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="ねったいぎょ">
  <defs>
    <clipPath id="ntg-body"><ellipse cx="98" cy="102" rx="46" ry="42"/></clipPath>
  </defs>
  <!-- white die-cut underlay -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="15" stroke-linejoin="round" stroke-linecap="round">
    <path d="M142,102 L186,64 Q190,102 186,140 Z"/>
    <path d="M74,58 L90,64 L100,50 L112,66 L126,60 Q110,74 84,72 Z"/>
    <path d="M82,134 L100,150 L118,134 Z"/>
    <ellipse cx="98" cy="102" rx="46" ry="42"/>
  </g>
  <!-- tail -->
  <path d="M142,102 L186,64 Q190,102 186,140 Z" fill="#FFB400" stroke="#3d2a1c" stroke-width="3.2" stroke-linejoin="round"/>
  <path d="M156,88 L172,74 M158,102 L178,102 M156,116 L172,130" fill="none" stroke="#D98A00" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- dorsal fin -->
  <path d="M74,58 L90,64 L100,50 L112,66 L126,60 Q110,74 84,72 Z" fill="#FFB400" stroke="#3d2a1c" stroke-width="3" stroke-linejoin="round"/>
  <!-- bottom fin -->
  <path d="M82,134 L100,150 L118,134 Z" fill="#FFB400" stroke="#3d2a1c" stroke-width="3" stroke-linejoin="round"/>
  <!-- body base -->
  <ellipse cx="98" cy="102" rx="46" ry="42" fill="#FF8A2E" stroke="#3d2a1c" stroke-width="3.2"/>
  <!-- yellow stripes -->
  <g clip-path="url(#ntg-body)">
    <rect x="58" y="56" width="16" height="94" fill="#FFDE3A"/>
    <rect x="92" y="56" width="16" height="94" fill="#FFDE3A"/>
    <rect x="126" y="56" width="14" height="94" fill="#FFDE3A"/>
    <path d="M74,58 L74,150 M90,58 L90,150 M108,58 L108,150 M124,58 L124,150" fill="none" stroke="#C85A16" stroke-width="2.4" opacity="0.55"/>
  </g>
  <!-- highlight -->
  <ellipse cx="80" cy="86" rx="13" ry="8" fill="#ffffff" opacity="0.26" transform="rotate(-16 80 86)"/>
  <!-- cheek -->
  <ellipse cx="72" cy="112" rx="7.5" ry="5" fill="#ff5c85" opacity="0.6"/>
  <!-- eye -->
  <circle cx="70" cy="96" r="9" fill="#2a1e16"/>
  <circle cx="73" cy="93" r="3.2" fill="#fff"/>
  <!-- mouth -->
  <path d="M52,106 Q60,113 68,107" fill="none" stroke="#3d2a1c" stroke-width="2.6" stroke-linecap="round"/>
</svg>
