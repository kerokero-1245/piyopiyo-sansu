<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="かえる">
  <!-- white die-cut underlay -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="15" stroke-linejoin="round" stroke-linecap="round">
    <path d="M60,158 Q50,178 70,178 Q82,172 82,154 Z"/>
    <path d="M140,158 Q150,178 130,178 Q118,172 118,154 Z"/>
    <ellipse cx="100" cy="120" rx="56" ry="46"/>
    <circle cx="74" cy="74" r="24"/>
    <circle cx="126" cy="74" r="24"/>
  </g>
  <!-- feet -->
  <path d="M60,158 Q50,178 70,178 Q82,172 82,154 Z" fill="#4FAE68" stroke="#3d2a1c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M140,158 Q150,178 130,178 Q118,172 118,154 Z" fill="#4FAE68" stroke="#3d2a1c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M62,170 L62,178 M70,171 L70,178 M130,170 L130,178 M138,171 L138,178" fill="none" stroke="#2f7c46" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <!-- body -->
  <ellipse cx="100" cy="120" rx="56" ry="46" fill="#5FBF7A" stroke="#3d2a1c" stroke-width="3.2"/>
  <!-- belly -->
  <path d="M66,128 Q100,168 134,128 Q124,150 100,152 Q76,150 66,128 Z" fill="#DDF3C4"/>
  <!-- eye bumps -->
  <circle cx="74" cy="74" r="24" fill="#5FBF7A" stroke="#3d2a1c" stroke-width="3.2"/>
  <circle cx="126" cy="74" r="24" fill="#5FBF7A" stroke="#3d2a1c" stroke-width="3.2"/>
  <!-- eyes -->
  <circle cx="74" cy="74" r="15" fill="#ffffff" stroke="#3d2a1c" stroke-width="2.4"/>
  <circle cx="126" cy="74" r="15" fill="#ffffff" stroke="#3d2a1c" stroke-width="2.4"/>
  <circle cx="76" cy="77" r="8" fill="#2a1e16"/>
  <circle cx="128" cy="77" r="8" fill="#2a1e16"/>
  <circle cx="79" cy="74" r="3" fill="#fff"/>
  <circle cx="131" cy="74" r="3" fill="#fff"/>
  <!-- nostrils -->
  <circle cx="93" cy="106" r="2.2" fill="#3d2a1c"/>
  <circle cx="107" cy="106" r="2.2" fill="#3d2a1c"/>
  <!-- cheeks -->
  <ellipse cx="62" cy="120" rx="10" ry="6.5" fill="#ff7ba0" opacity="0.72"/>
  <ellipse cx="138" cy="120" rx="10" ry="6.5" fill="#ff7ba0" opacity="0.72"/>
  <!-- wide smile -->
  <path d="M62,118 Q100,150 138,118" fill="none" stroke="#3d2a1c" stroke-width="4" stroke-linecap="round"/>
  <path d="M62,118 Q59,124 64,127 M138,118 Q141,124 136,127" fill="none" stroke="#3d2a1c" stroke-width="4" stroke-linecap="round"/>
  <!-- highlight -->
  <ellipse cx="66" cy="66" rx="7" ry="5" fill="#ffffff" opacity="0.3"/>
