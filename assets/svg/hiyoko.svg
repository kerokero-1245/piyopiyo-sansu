    <path d="M100,58 Q100,46 106,50 Q104,58 98,60 Z"/>
    <path d="M52,86 Q34,80 32,68 Q50,70 60,86 Z"/>
    <path d="M50,98 Q34,96 34,84 Q50,86 58,98 Z"/>
    <ellipse cx="94" cy="102" rx="46" ry="42"/>
    <path d="M138,84 L160,82 L142,96 Z"/>
    <path d="M138,98 L158,100 L140,106 Z"/>
    <path d="M84,142 L84,166 M84,166 L76,172 M84,166 L92,172 M84,166 L84,174"/>
    <path d="M104,142 L104,166 M104,166 L96,172 M104,166 L112,172 M104,166 L104,174"/>
  </g>
  <!-- legs -->
  <path d="M84,140 L84,166 M84,166 L76,172 M84,166 L92,172 M84,166 L84,174" fill="none" stroke="#FF8A2E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M104,140 L104,166 M104,166 L96,172 M104,166 L112,172 M104,166 L104,174" fill="none" stroke="#FF8A2E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
