  <path d="M52,86 Q34,80 32,68 Q50,70 60,86 Z" fill="#FFC21F" stroke="#3d2a1c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M50,98 Q34,96 34,84 Q50,86 58,98 Z" fill="#FFC21F" stroke="#3d2a1c" stroke-width="3" stroke-linejoin="round"/>
