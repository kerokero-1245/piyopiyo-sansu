<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="ねこ">
  <!-- white die-cut underlay -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="15" stroke-linejoin="round" stroke-linecap="round">
    <path d="M64,74 L50,36 Q49,31 55,34 L94,60 Z"/>
    <path d="M136,74 L150,36 Q151,31 145,34 L106,60 Z"/>
    <circle cx="100" cy="104" r="48"/>
  </g>
  <!-- ears (behind head) -->
  <path d="M64,74 L50,36 Q49,31 55,34 L94,60 Z" fill="#B9BFC9" stroke="#3d2a1c" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M136,74 L150,36 Q151,31 145,34 L106,60 Z" fill="#B9BFC9" stroke="#3d2a1c" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- inner ear -->
  <path d="M66,71 L57,46 L86,60 Z" fill="#FFB3C6"/>
  <path d="M134,71 L143,46 L114,60 Z" fill="#FFB3C6"/>
  <!-- head -->
  <circle cx="100" cy="104" r="48" fill="#B9BFC9" stroke="#3d2a1c" stroke-width="3.2"/>
  <!-- white muzzle -->
  <ellipse cx="100" cy="116" rx="25" ry="18" fill="#F5F2EE" stroke="#3d2a1c" stroke-width="2.6"/>
  <!-- whiskers (white casing then ink) -->
  <g fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round">
    <path d="M79,107 L46,101"/><path d="M79,113 L44,113"/><path d="M79,119 L47,125"/>
    <path d="M121,107 L154,101"/><path d="M121,113 L156,113"/><path d="M121,119 L153,125"/>
  </g>
  <g fill="none" stroke="#3d2a1c" stroke-width="2" stroke-linecap="round" opacity="0.82">
    <path d="M79,107 L46,101"/><path d="M79,113 L44,113"/><path d="M79,119 L47,125"/>
    <path d="M121,107 L154,101"/><path d="M121,113 L156,113"/><path d="M121,119 L153,125"/>
  </g>
  <!-- cheeks -->
  <ellipse cx="63" cy="111" rx="9" ry="6" fill="#ff7ba0" opacity="0.72"/>
  <ellipse cx="137" cy="111" rx="9" ry="6" fill="#ff7ba0" opacity="0.72"/>
  <!-- eyes -->
  <circle cx="80" cy="97" r="9" fill="#2a1e16"/>
  <circle cx="120" cy="97" r="9" fill="#2a1e16"/>
  <circle cx="83" cy="94" r="3.2" fill="#fff"/>
  <circle cx="123" cy="94" r="3.2" fill="#fff"/>
  <!-- nose -->
  <path d="M93,105 L107,105 Q100,113 93,105 Z" fill="#FF6F91" stroke="#3d2a1c" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- mouth -->
  <path d="M100,110 L100,113 M100,113 Q92,121 86,114 M100,113 Q108,121 114,114" fill="none" stroke="#3d2a1c" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
